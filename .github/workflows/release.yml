name: Build and Release SantaFilter

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller customtkinter pystray pillow sounddevice numpy pyrnnoise requests

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name SantaFilter SantaFilter.py

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SantaFilter.exe
          tag_name: ${{ github.ref }}
          name: SantaFilter ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}